<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Q.E.D.</title>
  <meta
    name="description"
    content="Q.E.D. is a mobile learning app that provides quiz solving records, statistics, and rankings."
  />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #dbe2ea;
      --accent: #0f766e;
      --accent-hover: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #d9f3ef 0, transparent 30%),
        radial-gradient(circle at bottom right, #dbeafe 0, transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      display: block;
      width: 96px;
      height: auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      line-height: 1.7;
    }

    .lead {
      font-size: 18px;
      color: var(--muted);
      max-width: 580px;
    }

    .section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .policy-links {
      margin-top: 12px;
    }

    .policy-links p + p {
      margin-top: 10px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }

    a:hover {
      color: var(--accent-hover);
    }

    .meta {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .logo img {
        width: 80px;
      }

      h1 {
        font-size: 32px;
      }

      .lead {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="logo">
        <img src="https://pggggggggh.github.io/QEDWeb/logo.svg" alt="Q.E.D. logo" />
      </div>

      <h1>Q.E.D.</h1>
      <p class="lead">
        Q.E.D. is a mobile learning app that provides quiz solving records, statistics, and rankings.
      </p>

      <div class="section">
        <h2>Legal</h2>
        <div class="policy-links">
          <p>
            Privacy Policy:
            <a href="https://pggggggggh.github.io/QEDWeb/privacy.html">
              Privacy Policy / 개인정보처리방침
            </a>
          </p>
          <p>
            Terms of Service:
            <a href="https://pggggggggh.github.io/QEDWeb/terms.html">
              Terms of Service / 이용약관
            </a>
          </p>
        </div>
      </div>

      <div class="section">
        <h2>Contact</h2>
        <p>Email: <a href="mailto:qed.official.app@gmail.com">qed.official.app@gmail.com</a></p>
      </div>

      <p class="meta">Official website for the Q.E.D. app.</p>
    </section>
  </main>
</body>
</html>
