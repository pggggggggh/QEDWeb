<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Q.E.D.</title>
  <meta
    name="description"
    content="Q.E.D.는 문제 풀이 기록, 통계, 랭킹을 제공하는 학습 앱입니다."
  />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #dbe2ea;
      --accent: #0f766e;
      --accent-hover: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #d9f3ef 0, transparent 30%),
        radial-gradient(circle at bottom right, #dbeafe 0, transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      display: block;
      width: 96px;
      height: auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      line-height: 1.7;
    }

    .lead {
      font-size: 18px;
      color: var(--muted);
      max-width: 580px;
    }

    .section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .button,
    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .link {
      border: 1px solid var(--line);
      color: var(--text);
      background: white;
    }

    .link:hover {
      border-color: #b8c3cf;
      background: #f9fafb;
    }

    .meta {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .logo img {
        width: 80px;
      }

      h1 {
        font-size: 32px;
      }

      .lead {
        font-size: 16px;
      }

      .links {
        flex-direction: column;
      }

      .link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="logo">
        <img src="./logo.svg" alt="Q.E.D. 로고" />
      </div>

      <h1>Q.E.D.</h1>
      <p class="lead">
        Q.E.D.는 문제 풀이 기록, 통계, 랭킹 기능을 제공하는 학습용 모바일 앱입니다.
      </p>

      <div class="section">
        <p>서비스 관련 안내는 아래 문서에서 확인할 수 있습니다.</p>
        <div class="links">
          <a class="link" href="./privacy.html">개인정보처리방침</a>
          <a class="link" href="./terms.html">이용약관</a>
        </div>
      </div>

      <p class="meta">문의: qed.official.app@gmail.com</p>
    </section>
  </main>
</body>
</html>
